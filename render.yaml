services:
  - type: web
    name: poster-design-api
    env: python
    plan: starter
    pythonVersion: 3.11
    
    # Entry point for the application
    startCommand: "pip install -r requirements.txt && python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    
    # Auto-deploy on push
    autoDeploy: true
    
    # Environment variables
    envVars:
      - key: DATABASE_URL
        sync: false  # Keep it secret on Render dashboard
      - key: OWNER_USERNAME
        sync: false
      - key: OWNER_PASSWORD
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: ALGORITHM
        value: HS256
      - key: ALLOWED_ORIGINS
        value: "*"
